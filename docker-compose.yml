version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vector-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: vector_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vector-network

  backend:
    build: ./backend
    container_name: vector-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/vector_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vector-network

  frontend:
    build: ./frontend
    container_name: vector-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      - vector-network

  nginx:
    image: nginx:alpine
    container_name: vector-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - vector-network

volumes:
  postgres_data:

networks:
  vector-network:
    driver: bridge