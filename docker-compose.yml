version: '3.8'

# Определение сервисов (контейнеров) приложения
services:
  #   СЕРВИС БАЗЫ ДАННЫХ  
  postgres:
    image: postgres:16-alpine   # Образ PostgreSQL на базе Alpine Linux (лёгкий)
    container_name: vector-postgres   # Имя контейнера для идентификации
    restart: always   # Автоматический перезапуск при падении
    environment:
      POSTGRES_USER: postgres   # Имя пользователя БД
      POSTGRES_DB: vector_db   # Название базы данных
    env_file:
      - .env   # Файл с переменными окружения (пароль)
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Персистентное хранилище данных
    healthcheck:   # Проверка готовности сервиса
      test: ["CMD-SHELL", "pg_isready -U postgres"]  # Команда проверки
      interval: 10s   # Интервал между проверками
      timeout: 5s   # Таймаут ожидания ответа
      retries: 5   # Количество попыток перед ошибкой
    networks:
      - vector-network   # Подключение к общей сети

  #   СЕРВИС БЭКЕНДА  
  backend:
    build: ./vector-back-end   # Сборка из Dockerfile в указанной директории
    container_name: vector-backend
    restart: always
    environment:
      NODE_ENV: production   # Режим выполнения приложения
      PORT: 4000   # Порт внутреннего сервера
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/vector_db?schema=public
      JWT_SECRET: ${JWT_SECRET}   # Секретный ключ для JWT (из .env)
    depends_on:   # Зависимости от других сервисов
      postgres:
        condition: service_healthy   # Ожидание успешного прохождения healthcheck
    networks:
      - vector-network

  #   СЕРВИС ФРОНТЕНДА  
  frontend:
    build: ./vector-front-end   # Сборка Next.js приложения
    container_name: vector-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api   # Относительный путь API (проксируется nginx)
    depends_on:
      - backend   # Зависимость от бэкенда (без healthcheck)
    networks:
      - vector-network

  #   REVERSE-PROXY (NGINX)  
  nginx:
    image: nginx:alpine   # Лёгкий образ nginx на Alpine Linux
    container_name: vector-nginx
    restart: always
    ports:
      - "80:80"   # Проброс порта хоста на контейнер
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro   # Монтирование конфигурации (только чтение)
    depends_on:
      - frontend
      - backend
    networks:
      - vector-network

#   ПЕРСИСТЕНТНОЕ ХРАНИЛИЩЕ  
volumes:
  postgres_data:   # Именованный том для данных PostgreSQL

#   СЕТЕВАЯ КОНФИГУРАЦИЯ  
networks:
  vector-network:
    driver: bridge   # Драйвер bridge для изоляции сети