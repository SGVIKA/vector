
#   БЛОК EVENTS  
# Управляет параметрами обработки соединений на уровне ОС
events {
    # Максимальное количество одновременных подключений на один рабочий процесс
    # Значение 1024 является стандартным для небольших и средних проектов
    worker_connections 1024;
}

#   БЛОК HTTP  
# Основная конфигурация HTTP-сервера
http {
    # Включение системного вызова sendfile для оптимизации отдачи статических файлов
    # Позволяет копировать данные напрямую из файлового дескриптора в сокет
    sendfile on;
    
    # Максимальный допустимый размер тела клиентского запроса
    # Установлен 10 МБ для поддержки загрузки файлов (аватарки, вложения)
    client_max_body_size 10M;

    #   АПСТРИМЫ (ГРУППЫ СЕРВЕРОВ)  
    
    # Группа серверов для бэкенда (API)
    upstream backend {
        # backend:4000 - имя контейнера и порт в сети Docker
        # Docker DNS автоматически разрешает имя в IP-адрес контейнера
        server backend:4000;
    }

    # Группа серверов для фронтенда (Next.js)
    upstream frontend {
        # frontend:3000 - стандартный порт Next.js в продакшн-режиме
        server frontend:3000;
    }

    #   ВИРТУАЛЬНЫЙ ХОСТ  
    server {
        # Прослушивание 80 порта (стандартный HTTP)
        listen 80;
        
        # server_name _ - соответствует любому доменному имени
        # _(подчёркивание) - невалидное значение, которое никогда не совпадает с реальным доменом
        # Используется для обработки запросов без указания конкретного домена
        server_name _;

        #   МАРШРУТ ДЛЯ API  
        # Обработка запросов к API бэкенда
        location /api/ {
            # Проксирование запросов на группу серверов backend
            proxy_pass http://backend;
            
            # Передача оригинального заголовка Host
            proxy_set_header Host $host;
            
            # Передача реального IP-адреса клиента
            proxy_set_header X-Real-IP $remote_addr;
            
            # Передача цепочки IP-адресов прокси-серверов
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        #   МАРШРУТ ДЛЯ ВСЕХ ОСТАЛЬНЫХ ЗАПРОСОВ  
        # Обработка всех остальных запросов (страницы, статика, клиентский роутинг)
        location / {
            # Проксирование запросов на группу серверов frontend
            proxy_pass http://frontend;
            
            # Передача оригинального заголовка Host
            proxy_set_header Host $host;
            
            # Передача реального IP-адреса клиента
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}